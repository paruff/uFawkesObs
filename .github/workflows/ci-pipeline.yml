name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write
  actions: write
  checks: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Stage 0: Pre-flight ──────────────────────────────────────────────────
  # Fastest feedback: pre-commit hooks, PR size, commit format, secret detection
  preflight:
    name: Pre-flight
    uses: paruff/ufawkespipe/.github/workflows/reusable-preflight.yml@v1.2.0

  # ─── Stage 1: Static Analysis (Lint) ────────────────────────────────────
  # Catch code quality issues BEFORE security scan or build
  lint:
    name: Static Analysis
    needs: [preflight]
    uses: paruff/ufawkespipe/.github/workflows/reusable-lint.yml@v1.1.1

  # ─── Stage 2: Security Scanning ─────────────────────────────────────────
  # Static security: secrets (Gitleaks), vulnerabilities (Trivy), dependencies
  # Runs BEFORE build — don't build code with known vulnerabilities
  security:
    name: Security Scanning
    needs: [lint]
    uses: paruff/ufawkespipe/.github/workflows/reusable-security-scanning.yml@v1.2.0
    with:
      scan-type: all
      severity-threshold: MEDIUM
      fail-on-critical: true
      upload-sarif: true

  # ─── Stage 2b: Dependency Review ────────────────────────────────────────
  # GitHub dependency graph analysis — blocks on critical/high
  dependency-review:
    name: Dependency Review
    needs: [lint]
    uses: paruff/ufawkespipe/.github/workflows/reusable-dependency-review.yml@v1.2.0
    with:
      fail-on-severity: high
      comment-summary-in-pr: "true"

  # ─── Stage 3: Build & Validate ─────────────────────────────────────────
  # Config validation + supply chain — only runs after code is clean
  build:
    name: Build & Validate
    needs: [security, dependency-review]
    uses: paruff/ufawkespipe/.github/workflows/reusable-build.yml@v1.2.0
    with:
      validate-prometheus: true
      validate-otel: true
      validate-tempo: true
      validate-grafana: true
      fail-on-latest: true
      enable-coverage-gate: false

  # ─── Stage 4: Tests ────────────────────────────────────────────────────
  # Unit, integration, acceptance smoke — runs on validated code
  tests:
    name: Tests
    needs: [build]
    uses: ./.github/workflows/ci-acceptance-smoke.yml

  # ─── Gate: Pipeline Complete ────────────────────────────────────────────
  pipeline-complete:
    name: Pipeline Complete
    needs: [preflight, lint, security, dependency-review, build, tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "=== Pipeline Results ==="
          echo "Preflight:          ${{ needs.preflight.result }}"
          echo "Static Analysis:    ${{ needs.lint.result }}"
          echo "Security Scanning:  ${{ needs.security.result }}"
          echo "Dependency Review:  ${{ needs.dependency-review.result }}"
          echo "Build & Validate:   ${{ needs.build.result }}"
          echo "Tests:              ${{ needs.tests.result }}"

          if [ "${{ needs.preflight.result }}" == "failure" ] || \
             [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.dependency-review.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.tests.result }}" == "failure" ]; then
            echo ""
            echo "❌ Pipeline FAILED"
            exit 1
          fi

          echo ""
          echo "✅ Pipeline PASSED"

      - name: DORA pipeline finish
        if: always()
        run: |
          echo "pipeline-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "pipeline-result:${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}"
