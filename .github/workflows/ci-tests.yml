name: CI Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Unit Tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/unit/requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: tests/unit/reports/
          if-no-files-found: ignore

  # ─── Acceptance Smoke Tests (replaces compose-smoke) ─────────────────────
  acceptance-smoke:
    name: Acceptance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/acceptance/requirements.txt

      - name: Build and start core
        run: |
          mkdir -p data/{tempo,loki,alloy,prometheus,alertmanager,grafana}
          chmod -R 777 data/
          docker compose --profile core up -d --build

      - name: Wait for services to stabilize
        run: sleep 90

      - name: Run acceptance smoke tests
        run: |
          pytest tests/acceptance/ -m "smoke" -v --tb=short \
            --stack-mode=existing \
            --junit-xml=reports/acceptance-smoke.xml \
            --evidence-dir=reports/acceptance-smoke-evidence

      - name: Upload smoke test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: acceptance-smoke-evidence
          path: reports/acceptance-smoke-evidence/
          if-no-files-found: ignore

      - name: Shutdown
        if: always()
        run: docker compose down -v

  # ─── Integration Tests ───────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [acceptance-smoke]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/integration/requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/prometheus data/grafana data/tempo data/loki data/alertmanager
          chmod -R 777 data/

      - name: Start observability stack
        run: docker compose --profile core up -d --build

      - name: Wait for services
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:9090/-/ready; do sleep 2; done'
          timeout 90 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 2; done'
          timeout 90 bash -c 'until curl -sf http://localhost:3200/ready; do sleep 2; done'
          timeout 90 bash -c 'until curl -sf http://localhost:3100/ready; do sleep 2; done'
          timeout 90 bash -c 'until curl -sf http://localhost:8888/metrics; do sleep 2; done'
          sleep 20

      - name: Run Prometheus scraping tests
        run: pytest tests/integration/test_prometheus_scraping.py -v --tb=short
        env:
          PROMETHEUS_URL: http://localhost:9090

      - name: Run OTel Collector tests
        run: pytest tests/integration/test_otel_collector.py -v --tb=short
        env:
          OTEL_METRICS_URL: http://localhost:8888

      - name: Run Grafana integration tests
        run: pytest tests/integration/test_grafana_integration.py -v --tb=short
        env:
          GRAFANA_URL: http://localhost:3000
          GRAFANA_USER: admin
          GRAFANA_PASSWORD: admin

      - name: Run Tempo integration tests
        run: pytest tests/integration/test_tempo_integration.py -v --tb=short
        env:
          TEMPO_URL: http://localhost:3200

      - name: Run Loki integration tests
        run: pytest tests/integration/test_loki_integration.py -v --tb=short
        env:
          LOKI_URL: http://localhost:3100

      - name: Run dashboard tests
        run: pytest tests/integration/test_dashboards.py -v --tb=short
        env:
          GRAFANA_URL: http://localhost:3000
          GRAFANA_USER: admin
          GRAFANA_PASSWORD: admin

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=50 prometheus grafana otel-collector tempo loki alloy

      - name: Shutdown
        if: always()
        run: docker compose --profile core down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: |
            tests/integration/reports/
            pytest-report.xml
          if-no-files-found: ignore

  # ─── Golden Path App ─────────────────────────────────────────────────────
  apps-test:
    name: Golden Path App
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [acceptance-smoke]
    steps:
      - uses: actions/checkout@v7

      - name: Check for app services
        id: check_apps
        run: |
          if grep -q '"8080:8080"' compose.yaml; then
            echo "has_apps=true" >> $GITHUB_OUTPUT
          else
            echo "has_apps=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and start full stack
        if: steps.check_apps.outputs.has_apps == 'true'
        run: |
          mkdir -p data/prometheus data/grafana
          chmod -R 777 data/
          docker compose --profile core --profile apps up -d --build

      - name: Wait
        if: steps.check_apps.outputs.has_apps == 'true'
        run: sleep 30

      - name: Hit endpoints
        if: steps.check_apps.outputs.has_apps == 'true'
        run: |
          curl -f http://localhost:8080/
          curl -f http://localhost:8080/slow
          curl -f http://localhost:8080/error || true

      - name: Shutdown
        if: always() && steps.check_apps.outputs.has_apps == 'true'
        run: docker compose down -v

      - name: Skip
        if: steps.check_apps.outputs.has_apps == 'false'
        run: echo "No demo app services (port 8080) found. Skipping."
