---
# SPDX-License-Identifier: Apache-2.0
name: ufawkesobs

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/collector.yaml"]
    volumes:
      - ./config/otel/collector.yaml:/etc/otel/collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector's own telemetry metrics
      - "8889:8889"   # Prometheus exporter for app metrics
    environment:
      - TZ=UTC
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "otel-collector"
    labels:
      - "plane=obstackd"
      - "component=otel-collector"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["core"]

  tempo:
    image: grafana/tempo:2.10.5
    container_name: tempo
    restart: unless-stopped
    command:
      - "--config.file=/etc/tempo/tempo.yaml"
      - "--storage.trace.local.path=/var/tempo"
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ./data/tempo:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "9095:9095"   # Tempo gRPC
      - "14250:14250"  # Jaeger gRPC
      - "14268:14268"  # Jaeger HTTP
      - "9411:9411"   # Zipkin
    environment:
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    # NOTE: healthcheck removed — Tempo v2.10+ uses distroless image without wget/curl/sh.
    # See: https://github.com/grafana/tempo/issues/6536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "tempo"
    labels:
      - "plane=obstackd"
      - "component=tracing"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["core"]

  loki:
    image: grafana/loki:2.9.10
    container_name: loki
    restart: unless-stopped
    command:
      - "--config.file=/etc/loki/loki.yaml"
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ./data/loki:/loki
    ports:
      - "3100:3100"   # Loki HTTP
      - "9096:9096"   # Loki gRPC
    environment:
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "loki"
    labels:
      - "plane=obstackd"
      - "component=logging"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["core"]

  alloy:
    image: grafana/alloy:v1.12.2
    container_name: alloy
    restart: unless-stopped
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy"
      - "/etc/alloy/config.river"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/alloy/config.river:/etc/alloy/config.river:ro
      - ./data/alloy:/var/lib/alloy
    ports:
      - "12345:12345"   # Alloy HTTP/metrics
    environment:
      - TZ=UTC
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "alloy"
    labels:
      - "plane=obstackd"
      - "component=collector"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["core"]

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
      - "--web.enable-remote-write-receiver"
      - "--web.external-url=http://localhost:9090"
      - "--log.level=info"
      - "--log.format=json"
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"
    environment:
      - TZ=UTC
    depends_on:
      - alertmanager
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "prometheus"
    labels:
      - "plane=obstackd"
      - "component=metrics"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["core"]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
      - "--cluster.listen-address="
      - "--log.level=info"
      - "--log.format=json"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/alertmanager
    ports:
      - "9093:9093"
    environment:
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "alertmanager"
    labels:
      - "plane=obstackd"
      - "component=alerting"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["core"]

  grafana:
    image: grafana/grafana:10.4.5
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_LOG_MODE=console
      - GF_LOG_FORMAT=json
      - GF_METRICS_ENABLED=true
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./dashboards/platform:/etc/grafana/dashboards/platform:ro
      - ./dashboards/services:/etc/grafana/dashboards/services:ro
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "grafana"
    labels:
      - "plane=obstackd"
      - "component=visualization"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["core"]

  # Demo application that generates telemetry for testing
  telemetry-generator:
    build:
      context: ./apps/telemetry-generator
      dockerfile: Dockerfile
    container_name: telemetry-generator
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=telemetry-generator
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "telemetry-generator"
    labels:
      - "plane=obstackd"
      - "component=telemetry-generator"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["apps"]

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "node-exporter"
    labels:
      - "plane=obstackd"
      - "component=node-exporter"
      - "managed-by=fawkes"
    networks:
      - observability
    profiles: ["core"]

networks:
  observability:
    name: observability-lab
    driver: bridge
