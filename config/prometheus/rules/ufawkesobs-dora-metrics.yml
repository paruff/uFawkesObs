# SPDX-License-Identifier: Apache-2.0
# DORA 2025 Metrics Recording Rules
# Computed from uFawkesObs telemetry (deployment spans, incident alerts)
# Consumed by uFawkesDORA for DORA 2025 dashboard and alerting
#
# Metric naming: Uses "dora:" namespace per ADR-006.
# Source metrics from OTel Collector dora pipeline:
#   - dora.deployment.started (counter)
#   - dora.deployment.succeeded (counter)
#   - dora.deployment.failed (counter)
#   - dora.deployment.lead_time_hours (histogram)
#   - dora.incident.opened (counter)
#   - dora.incident.resolved (counter)
#   - dora.incident.duration_hours (histogram)

groups:
  # DORA recording rules
  # All rules use or vector(0) to prevent absent() gaps
  - name: ufawkesobs_dora_metrics
    interval: 60s
    rules:
      # Deployment Frequency: successful production deployments per 30 days
      - record: dora:deployment_frequency:rate30d
        expr: |
          sum(rate(dora_deployment_succeeded_total{environment="production"}[30d]))
          or vector(0)

      # Lead Time for Changes: median hours from commit to production deployment
      # Uses dora_deployment_lead_time_hours histogram from deployment spans
      - record: dora:lead_time_hours:p50_30d
        expr: |
          histogram_quantile(0.50,
            sum(rate(dora_deployment_lead_time_hours_bucket[30d]))
              by (le)
          )
          or vector(0)

      # Change Failure Rate: ratio of failed to total production deployments (30d)
      - record: dora:change_failure_rate:ratio30d
        expr: |
          sum(rate(dora_deployment_failed_total{environment="production"}[30d]))
          /
          (
            sum(rate(dora_deployment_failed_total{environment="production"}[30d]))
            +
            sum(rate(dora_deployment_succeeded_total{environment="production"}[30d]))
          )
          or vector(0)

      # Mean Time to Restore (MTTR): median hours to resolve incidents (30d)
      # Uses dora_incident_duration_hours histogram from incident resolved events
      - record: dora:mttr_hours:p50_30d
        expr: |
          histogram_quantile(0.50,
            sum(rate(dora_incident_duration_hours_bucket[30d]))
              by (le)
          )
          or vector(0)

  # DORA alerting rules
  # All alerts have category: dora label
  # All alerts have paired absent() guards
  - name: ufawkesobs_dora_alerts
    interval: 60s
    rules:
      # Deployment Frequency Low
      - alert: DORADeploymentFrequencyLow
        expr: |
          dora:deployment_frequency:rate30d < 1
        for: 7d
        labels:
          severity: warning
          category: dora
        annotations:
          summary: "Deployment frequency is below 1 per 30 days"
          description: |
            Deployment frequency has dropped below 1 deployment per 30 days.
            This may indicate stalled development or deployment pipeline issues.
            DORA 2025: Elite > 1/day, High > 1/week, Medium > 1/month, Low < 1/month.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#deployment-frequency-low"

      - alert: DORADeploymentFrequencyLowAbsent
        expr: |
          absent(dora:deployment_frequency:rate30d)
        for: 7d
        labels:
          severity: warning
          category: dora
        annotations:
          summary: "Deployment frequency metrics are missing"
          description: |
            DORA deployment frequency metric is absent. Deployment spans may not be flowing.
            Check CI/CD pipeline telemetry configuration.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#deployment-frequency-absent"

      # Lead Time High
      - alert: DORALeadTimeHigh
        expr: |
          dora:lead_time_hours:p50_30d > 24
        for: 7d
        labels:
          severity: warning
          category: dora
        annotations:
          summary: "Lead time for changes exceeds 24 hours"
          description: |
            Median lead time from commit to production deployment exceeds 24 hours.
            DORA 2025: Elite < 1h, High < 1d, Medium < 1w, Low > 1w.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#lead-time-high"

      - alert: DORALeadTimeHighAbsent
        expr: |
          absent(dora:lead_time_hours:p50_30d)
        for: 7d
        labels:
          severity: warning
          category: dora
        annotations:
          summary: "Lead time metrics are missing"
          description: |
            Lead time metric is absent. Deployment spans may not include lead_time_hours.
            Check CI/CD pipeline is emitting lead_time_hours attribute.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#lead-time-absent"

      # Change Failure Rate High
      - alert: DORAChangeFailureRateHigh
        expr: |
          dora:change_failure_rate:ratio30d > 0.15
        for: 7d
        labels:
          severity: warning
          category: dora
        annotations:
          summary: "Change failure rate exceeds 15%"
          description: |
            Change failure rate has exceeded 15% over the last 30 days.
            DORA 2025: Elite < 5%, High < 15%, Medium < 30%, Low > 30%.
            Review deployment quality and testing practices.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#change-failure-rate-high"

      - alert: DORAChangeFailureRateCritical
        expr: |
          dora:change_failure_rate:ratio30d > 0.30
        for: 7d
        labels:
          severity: critical
          category: dora
        annotations:
          summary: "Change failure rate exceeds 30% — stop features"
          description: |
            Change failure rate has exceeded 30% over the last 30 days.
            DORA 2025: Low performance band. Stop new features, fix deployment quality.
            Review AGENTS.md and CI/CD pipeline for root causes.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#change-failure-rate-critical"

      - alert: DORAChangeFailureRateHighAbsent
        expr: |
          absent(dora:change_failure_rate:ratio30d)
        for: 7d
        labels:
          severity: warning
          category: dora
        annotations:
          summary: "Change failure rate metrics are missing"
          description: |
            Change failure rate metric is absent. Deployment failure/success metrics may not be flowing.
            Check CI/CD pipeline is emitting deployment status.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#change-failure-rate-absent"

      # MTTR High
      - alert: DORAMTTRHigh
        expr: |
          dora:mttr_hours:p50_30d > 4
        for: 7d
        labels:
          severity: warning
          category: dora
        annotations:
          summary: "Mean time to restore exceeds 4 hours"
          description: |
            Median time to restore service after incidents exceeds 4 hours.
            DORA 2025: Elite < 1h, High < 4h, Medium < 1d, Low > 1w.
            Review incident response procedures and on-call runbooks.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#mttr-high"

      - alert: DORAMTTRHighAbsent
        expr: |
          absent(dora:mttr_hours:p50_30d)
        for: 7d
        labels:
          severity: warning
          category: dora
        annotations:
          summary: "MTTR metrics are missing"
          description: |
            MTTR metric is absent. Incident duration metrics may not be flowing.
            Check Alertmanager alerts are firing and resolving with duration_hours attribute.
          runbook_url: "https://github.com/paruff/uFawkesObs/blob/main/docs/runbooks/dora.md#mttr-absent"
