---
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "development"
    cluster: "local"

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

# Rule files
rule_files:
  - "/etc/prometheus/alerts.yml"
  - "/etc/prometheus/rules/ufawkesobs-self-monitoring.yml"
  - "/etc/prometheus/rules/ai-rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          plane: "obstackd"
          component: "prometheus"
    scrape_interval: 30s

  # OpenTelemetry Collector (internal metrics)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          plane: "obstackd"
          component: "otel-collector"
          service: "telemetry"
    scrape_interval: 15s
    metrics_path: "/metrics"
    scheme: "http"

    # Relabeling for better metric organization
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: "${1}"

    # Optional: metric relabeling to clean up metric names
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "otelcol_(.*)"
        target_label: otel_component
        replacement: "${1}"

    # Scrape timeout and retry settings
    scrape_timeout: 10s
    honor_labels: true

  # OpenTelemetry Collector (application metrics from Prometheus exporter)
  - job_name: "otel-app-metrics"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          plane: "obstackd"
          component: "otel-collector"
          service: "application-metrics"
    scrape_interval: 15s
    metrics_path: "/metrics"
    scheme: "http"
    scrape_timeout: 10s
    honor_labels: true

  # Alertmanager
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
        labels:
          plane: "obstackd"
          component: "alertmanager"
          service: "alerting"
    scrape_interval: 30s
    metrics_path: "/metrics"
    scheme: "http"

  # Alloy
  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]
        labels:
          plane: "obstackd"
          component: "alloy"
    scrape_interval: 15s
    metrics_path: "/metrics"
    scheme: "http"

  # Loki
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          plane: "obstackd"
          component: "loki"
          service: "logging"
    scrape_interval: 15s
    metrics_path: "/metrics"
    scheme: "http"

  # Tempo
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          plane: "obstackd"
          component: "tempo"
          service: "tracing"
    scrape_interval: 15s
    metrics_path: "/metrics"
    scheme: "http"

  # Grafana
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          plane: "obstackd"
          component: "grafana"
    scrape_interval: 30s
    metrics_path: "/metrics"
    scheme: "http"

  # Node Exporter
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          plane: "obstackd"
          component: "node-exporter"
    scrape_interval: 15s
    metrics_path: "/metrics"
    scheme: "http"
