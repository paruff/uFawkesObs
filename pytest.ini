[pytest]
# Pytest configuration for unit and integration tests

testpaths = tests/unit tests/integration tests/e2e tests/acceptance
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    metrics: marks tests related to metrics collection
    prometheus: marks tests related to Prometheus
    otel: marks tests related to OpenTelemetry Collector
    grafana: marks tests related to Grafana
    tempo: marks tests related to Tempo
    loki: marks tests related to Loki
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    e2e: marks tests as end-to-end tests
    config_validation: marks tests for configuration validation
    acceptance: marks tests as acceptance/BDD tests
    offline: marks acceptance tests that run without a live stack
    ai: marks AI observability tests
    adr: marks ADR documentation sync tests
    m1: marks M1 core substrate tests
    m1.5: marks M1.5 ADR docs sync tests
    m-ai: marks OBS-AI feature tests
    m2: marks M2 repo hardening tests
    docs: marks documentation tests
    dashboards: marks Grafana dashboard tests
    nfr: marks non-functional requirement tests
    specification: marks specification tests
    rules: marks Prometheus rule tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Output
addopts = -v --tb=short

# Test discovery
norecursedirs = .git .venv venv __pycache__ *.egg-info dist build reports
